<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #fff;
      font-family: 'Inter', sans-serif;
      color: #111;
      padding-bottom: 4px;
    }

    .header {
      background: #fff;
      border-bottom: 1.5px solid #f0f0f0;
      padding: 14px 16px 10px;
      text-align: center;
    }

    .header img {
      width: 140px;
      height: auto;
      display: block;
      margin: 0 auto 8px;
    }

    .header-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: #999;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #f8f8f8;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 7px 10px;
      margin: 12px 16px 0;
      font-size: 11px;
      color: #555;
      font-weight: 500;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .dot.active  { background: #22c55e; box-shadow: 0 0 0 2px #bbf7d0; }
    .dot.stopped { background: #ef4444; box-shadow: 0 0 0 2px #fecaca; }

    .section-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #999;
      margin: 14px 16px 6px;
    }

    .select-all-row {
      display: flex;
      justify-content: flex-end;
      padding: 0 16px;
      margin-bottom: 6px;
    }

    .tiny-link {
      font-size: 9px;
      color: #aaa;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }
    .tiny-link:hover { color: #555; }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 0 16px;
    }

    .filter-chip {
      font-size: 9px;
      font-weight: 500;
      padding: 4px 9px;
      border-radius: 20px;
      border: 1.5px solid #e5e5e5;
      background: #fff;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
      line-height: 1;
    }

    .filter-chip:hover {
      border-color: #fbbf24;
      color: #92400e;
      background: #fffbeb;
    }

    .filter-chip.active {
      background: #fbbf24;
      border-color: #f59e0b;
      color: #451a03;
      font-weight: 600;
    }

    .divider {
      height: 1px;
      background: #f0f0f0;
      margin: 14px 16px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1;
      padding: 10px 6px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      transition: transform 0.08s;
    }

    .btn:active { transform: scale(0.96); }

    .btn-start {
      background: #fbbf24;
      color: #451a03;
      border-bottom: 3px solid #d97706;
    }
    .btn-start:hover { background: #fcd34d; }

    .btn-stop {
      background: #ef4444;
      color: #fff;
      border-bottom: 3px solid #b91c1c;
    }
    .btn-stop:hover { background: #f87171; }
  </style>
</head>
<body>

  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokemon">
    <div class="header-sub">Legendary Hunter</div>
  </div>

  <div class="status-row">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Ready to hunt</span>
  </div>

  <div class="section-label">Pokemon Types</div>
  <div class="select-all-row">
    <button class="tiny-link" id="toggleAll">Select all</button>
  </div>
  <div class="filters" id="typeFilters">
    <button class="filter-chip active" data-type="shiny">Shiny</button>
    <button class="filter-chip active" data-type="metallic">Metallic</button>
    <button class="filter-chip active" data-type="ghostly">Ghostly</button>
    <button class="filter-chip active" data-type="dark">Dark</button>
    <button class="filter-chip active" data-type="shadow">Shadow</button>
    <button class="filter-chip active" data-type="mirage">Mirage</button>
    <button class="filter-chip active" data-type="chrome">Chrome</button>
    <button class="filter-chip active" data-type="negative">Negative</button>
    <button class="filter-chip active" data-type="retro">Retro</button>
  </div>

  <div class="divider"></div>

  <div class="section-label" style="margin-top:0;">Rarity</div>
  <div class="filters">
    <button class="filter-chip active" data-type="legendary">Legendary</button>
    <button class="filter-chip active" data-type="paradox">Paradox</button>
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button class="btn btn-start" id="startBtn">Start Hunt</button>
    <button class="btn btn-stop" id="stopBtn">Stop</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
